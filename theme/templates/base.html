<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ SITESUBTITLE }}{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/main.css">
    {% block extra_head %}{% endblock %}
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <a href="{{ SITEURL }}/" class="site-logo">
                <span class="logo-mark">FS</span>
                <span class="logo-text">FieldStation<em>42</em></span>
            </a>
            <nav class="site-nav">
                {% for title, url in MENUITEMS %}
                <a href="{{ url }}" class="nav-link {% if request and request.path == url %}active{% endif %}">{{ title }}</a>
                {% endfor %}
                <a href="https://github.com/shane-mason/FieldStation42" class="nav-link nav-github" target="_blank" rel="noopener">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
                    GitHub
                </a>
            </nav>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <section class="site-search">
        <div class="site-search-inner">
            <p class="site-search-label">Search the docs</p>
            <form class="site-search-form" action="/search/" method="get">
                <input class="site-search-input" type="search" name="q" placeholder="Commands, config options, channel types…" aria-label="Search">
                <button class="site-search-btn" type="submit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    Search
                </button>
            </form>
        </div>
    </section>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="logo-mark small">FS</span>
                <span>FieldStation42</span>
            </div>
            <div class="footer-links">
                <a href="https://github.com/shane-mason/FieldStation42" target="_blank" rel="noopener">GitHub</a>
                <a href="https://youtube.com/@wrongdogreckons" target="_blank" rel="noopener">YouTube</a>
                <a href="/news/">News</a>
                <a href="/docs/">Docs</a>
            </div>
            <p class="footer-copy">Open source project by <a href="https://youtube.com/@wrongdogreckons">WrongDog Reckons</a></p>
        </div>
    </footer>

    <script src="{{ SITEURL }}/theme/js/main.js"></script>
</body>
</html>
